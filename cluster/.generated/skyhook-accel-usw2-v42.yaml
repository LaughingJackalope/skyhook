# ==============================================================================
# Skyhook Cluster Release Template
# ==============================================================================
#
# This template creates an EKS cluster that references a pre-existing
# foundation layer (VPC, subnets, etc.) created by the foundation stack.
#
# Variables (set via environment or Makefile):
#   CLUSTER_NAME    - Cluster release name (e.g., skyhook-accel-usw2-v42)
#   ENV             - Foundation environment (e.g., accel-usw2)
#   VPC_ID          - Foundation VPC ID
#   SYSTEM_SUBNETS  - Comma-separated system subnet IDs
#   SSH_PUBLIC_KEY_PATH - Path to SSH public key (optional)
#
# Usage:
#   make cluster-up ENV=accel-usw2 CLUSTER=v42

apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: skyhook-accel-usw2-v42
  region: us-west-2
  version: "1.32"
  tags:
    skyhook.io/environment: accel-usw2
    skyhook.io/cluster-release: skyhook-accel-usw2-v42
    skyhook.io/managed-by: eksctl

# Reference the foundation VPC instead of creating new
vpc:
  id: vpc-092d808c1bbe46da0
  subnets:
    private:
      # System subnets from foundation layer
      # eksctl will auto-discover AZs from subnet IDs
      us-west-2a:
        id: subnet-02c01314416286b3b
      us-west-2b:
        id: subnet-04141297cfaf62363
      us-west-2c:
        id: subnet-0aa8044a424fde00a
  clusterEndpoints:
    publicAccess: true   # Enable for initial setup, can disable later
    privateAccess: true

# Disable auto mode to use Karpenter for compute
autoModeConfig:
  enabled: false

# Enable OIDC for IRSA (Pod Identity)
iam:
  withOIDC: true

# System node group only - Karpenter handles HPC nodes
managedNodeGroups:
  - name: system-pool
    instanceType: m5.large  # Standard instance for system components
    minSize: 2
    maxSize: 5
    desiredCapacity: 2
    amiFamily: AmazonLinux2  # Use AL2 for reliability, Bottlerocket later
    privateNetworking: true
    subnets:
      - subnet-02c01314416286b3b
      - subnet-04141297cfaf62363
    labels:
      skyhook.io/node-role: system
    tags:
      skyhook.io/environment: accel-usw2
      skyhook.io/node-pool: system
    iam:
      withAddonPolicies:
        ebs: true
        fsx: true
        cloudWatch: true

# EKS add-ons managed by eksctl
addons:
  - name: vpc-cni
    version: latest
    configurationValues: |
      env:
        ENABLE_PREFIX_DELEGATION: "true"
        WARM_PREFIX_TARGET: "1"
        WARM_IP_TARGET: "5"
    podIdentityAssociations:
      - namespace: kube-system
        serviceAccountName: aws-node
        permissionPolicyARNs:
          - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy

  - name: coredns
    version: latest

  - name: kube-proxy
    version: latest

  - name: eks-pod-identity-agent
    version: latest

  # EBS CSI for persistent volumes (non-FSx workloads)
  - name: aws-ebs-csi-driver
    version: latest
    podIdentityAssociations:
      - namespace: kube-system
        serviceAccountName: ebs-csi-controller-sa
        permissionPolicyARNs:
          - arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy

  # FSx CSI for Lustre access (mounts foundation FSx)
  - name: aws-fsx-csi-driver
    version: latest
    podIdentityAssociations:
      - namespace: kube-system
        serviceAccountName: fsx-csi-controller-sa
        permissionPolicyARNs:
          - arn:aws:iam::aws:policy/AmazonFSxFullAccess

# CloudWatch logging configuration
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
    logRetentionInDays: 30

