# AWS VPC CNI Helm Values
# Chart: aws-vpc-cni
# Repo: https://aws.github.io/eks-charts
# Version: 1.18.2

enableNetworkPolicy: true

init:
  image:
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

env:
  ENABLE_PREFIX_DELEGATION: "true"
  WARM_PREFIX_TARGET: "1"
  WARM_ENI_TARGET: "0"
  MINIMUM_IP_TARGET: "10"
  AWS_VPC_K8S_CNI_EXTERNALSNAT: "false"
  AWS_VPC_K8S_CNI_CUSTOM_NETWORK_CFG: "false"
  AWS_VPC_K8S_CNI_RANDOMIZESNAT: "prng"
  AWS_VPC_ENI_MTU: "9001"
  AWS_VPC_K8S_CNI_LOGLEVEL: "DEBUG"
  AWS_VPC_K8S_CNI_LOG_FILE: "/host/var/log/aws-routed-eni/ipamd.log"
  ENABLE_POD_ENI: "false"

efa:
  enabled: true

resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi

nodeAgent:
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

tolerations:
  - operator: Exists

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: "10%"

livenessProbe:
  initialDelaySeconds: 60
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 1
  periodSeconds: 10

serviceMonitor:
  enabled: true

