# AWS Load Balancer Controller Helm Values
# Chart: aws-load-balancer-controller
# Repo: https://aws.github.io/eks-charts
# Version: 1.9.2

# Required: Set these via --set or cluster overlay
# clusterName: ""
# vpcId: ""
# region: ""

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  # IRSA annotation - set via --set
  annotations: {}

replicaCount: 2

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

podDisruptionBudget:
  minAvailable: 1

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: aws-load-balancer-controller

enableShield: false
enableWaf: false
enableWafv2: false

defaultTags:
  skyhook.io/managed-by: aws-load-balancer-controller

ingressClass: alb
createIngressClassResource: true
defaultTargetType: ip
logLevel: info
webhookBindPort: 9443
enableCertManager: false

nodeSelector:
  kubernetes.io/os: linux

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - aws-load-balancer-controller
          topologyKey: kubernetes.io/hostname

