# Skyhook Documentation Deployment
# Static MkDocs site served via nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skyhook-docs
  namespace: docs
  labels:
    app.kubernetes.io/name: skyhook-docs
    app.kubernetes.io/component: documentation
    skyhook.io/component: docs
    skyhook.io/tier: platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: skyhook-docs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: skyhook-docs
        app.kubernetes.io/component: documentation
        skyhook.io/component: docs
    spec:
      serviceAccountName: skyhook-docs
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: docs
          image: skyhook-docs:latest  # Override via kustomize
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: skyhook-docs
      nodeSelector:
        kubernetes.io/os: linux
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skyhook-docs
  namespace: docs
  labels:
    app.kubernetes.io/name: skyhook-docs
    skyhook.io/component: docs
---
apiVersion: v1
kind: Service
metadata:
  name: skyhook-docs
  namespace: docs
  labels:
    app.kubernetes.io/name: skyhook-docs
    skyhook.io/component: docs
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: skyhook-docs
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skyhook-docs
  namespace: docs
  labels:
    app.kubernetes.io/name: skyhook-docs
    skyhook.io/component: docs
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/inbound-cidrs: "10.0.0.0/8"
    alb.ingress.kubernetes.io/tags: "skyhook.io/component=docs,skyhook.io/tier=platform"
    # Uncomment for HTTPS (requires ACM certificate)
    # alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    # alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:...
    # alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
spec:
  ingressClassName: alb
  rules:
    - host: docs.skyhook.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: skyhook-docs
                port:
                  number: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: skyhook-docs
  namespace: docs
  labels:
    app.kubernetes.io/name: skyhook-docs
    skyhook.io/component: docs
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: skyhook-docs


