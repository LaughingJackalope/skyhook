# Fluent Bit Helm Values
# Chart: fluent-bit
# Repo: https://fluent.github.io/helm-charts
# Version: 0.46.6

serviceAccount:
  create: true
  name: fluent-bit
  # IRSA annotation - set via --set
  annotations: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

tolerations:
  - operator: Exists

priorityClassName: system-node-critical

config:
  service: |
    [SERVICE]
        Daemon Off
        Flush 5
        Log_Level info
        Parsers_File /fluent-bit/etc/parsers.conf
        Parsers_File /fluent-bit/etc/conf/custom_parsers.conf
        HTTP_Server On
        HTTP_Listen 0.0.0.0
        HTTP_Port 2020
        Health_Check On
        storage.path /var/fluent-bit/state/
        storage.sync normal
        storage.checksum off
        storage.max_chunks_up 128
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/containers/*.log
        multiline.parser docker, cri
        Tag kube.*
        Mem_Buf_Limit 50MB
        Skip_Long_Lines On
        Refresh_Interval 10
        DB /var/fluent-bit/state/flb_container.db
        DB.sync normal
    [INPUT]
        Name systemd
        Tag host.*
        Systemd_Filter _SYSTEMD_UNIT=kubelet.service
        Read_From_Tail On
        Strip_Underscores On
  filters: |
    [FILTER]
        Name kubernetes
        Match kube.*
        Merge_Log On
        Keep_Log Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On
        Labels On
        Annotations Off
        Buffer_Size 0
    [FILTER]
        Name modify
        Match kube.*
        Add cluster ${CLUSTER_NAME}
        Add environment ${ENVIRONMENT}
    [FILTER]
        Name nest
        Match kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix kubernetes_
    [FILTER]
        Name rewrite_tag
        Match kube.*
        Rule $kubernetes_labels['skypilot.co/task-id'] ^.+$ skypilot.$kubernetes_labels['skypilot.co/task-id'] false
        Emitter_Name re_emitter
  outputs: |
    [OUTPUT]
        Name cloudwatch_logs
        Match kube.*
        region ${AWS_REGION}
        log_group_name /aws/eks/${CLUSTER_NAME}/containers
        log_stream_prefix fluentbit-
        auto_create_group true
        log_retention_days 30
        extra_user_agent container-insights
    [OUTPUT]
        Name cloudwatch_logs
        Match skypilot.*
        region ${AWS_REGION}
        log_group_name /skypilot/${ENVIRONMENT}/tasks
        log_stream_prefix task-
        auto_create_group true
        log_retention_days 90
    [OUTPUT]
        Name cloudwatch_logs
        Match host.*
        region ${AWS_REGION}
        log_group_name /aws/eks/${CLUSTER_NAME}/host
        log_stream_prefix host-
        auto_create_group true
        log_retention_days 30
  customParsers: |
    [PARSER]
        Name docker_no_time
        Format json
        Time_Keep Off
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
    [PARSER]
        Name json_parser
        Format json
        Time_Key time
        Time_Format %Y-%m-%dT%H:%M:%S.%LZ

env:
  - name: AWS_REGION
    value: ""  # Set via --set
  - name: CLUSTER_NAME
    value: ""  # Set via --set
  - name: ENVIRONMENT
    value: ""  # Set via --set

volumeMounts:
  - name: varlog
    mountPath: /var/log
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true
  - name: state
    mountPath: /var/fluent-bit/state

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers
  - name: state
    hostPath:
      path: /var/fluent-bit/state
      type: DirectoryOrCreate

serviceMonitor:
  enabled: true
  namespace: logging
  interval: 30s
  additionalLabels:
    release: kube-prometheus-stack

