apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-standard
spec:
  template:
    metadata:
      labels:
        skyhook.io/tier: gpu
        skyhook.io/pool: gpu-standard
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
      expireAfter: 168h
  limits:
    cpu: 500
    memory: 4000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30m
  weight: 30
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: gpu-spot
spec:
  template:
    metadata:
      labels:
        skyhook.io/tier: gpu
        skyhook.io/pool: gpu-spot
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: gpu
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
        - key: karpenter.sh/capacity-type
          value: spot
          effect: NoSchedule
      expireAfter: 24h
  limits:
    cpu: 200
    memory: 1000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
  weight: 40
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: hpc-distributed
spec:
  template:
    metadata:
      labels:
        skyhook.io/tier: hpc
        skyhook.io/pool: hpc-distributed
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: hpc
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
      taints:
        - key: nvidia.com/gpu
          effect: NoSchedule
        - key: skyhook.io/workload
          value: hpc
          effect: NoSchedule
      expireAfter: 168h
  limits:
    cpu: 1000
    memory: 12000Gi
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1h
  weight: 50

