# Kyverno Helm Values
# Chart: kyverno
# Repo: https://kyverno.github.io/kyverno/
# Version: 3.2.7

admissionController:
  replicas: 3
  serviceMonitor:
    enabled: true
  container:
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi

backgroundController:
  replicas: 2
  serviceMonitor:
    enabled: true

cleanupController:
  replicas: 2
  serviceMonitor:
    enabled: true

reportsController:
  replicas: 2
  serviceMonitor:
    enabled: true

webhooksCleanup:
  enabled: true

features:
  policyExceptions:
    enabled: true
  logging:
    format: json

