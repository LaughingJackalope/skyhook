apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-efa-env
  annotations:
    policies.kyverno.io/title: Inject EFA Environment Variables
    policies.kyverno.io/category: HPC Configuration
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Automatically inject EFA (Elastic Fabric Adapter) environment variables
      into containers that request vpc.amazonaws.com/efa resources. Without
      these variables, NCCL silently falls back to TCP networking, running
      approximately 10x slower with no error messages. This policy eliminates
      that silent degradation by ensuring EFA is always configured correctly.
spec:
  background: true
  rules:
    - name: inject-efa-environment
      match:
        any:
          - resources:
              kinds:
                - Pod
      preconditions:
        all:
          - key: "{{ request.object.spec.containers[?resources.limits.\"vpc.amazonaws.com/efa\"] | length(@) }}"
            operator: GreaterThan
            value: 0
      mutate:
        foreach:
          - list: "request.object.spec.containers[]"
            patchesJson6902: |-
              - op: add
                path: /spec/containers/{{elementIndex}}/env/-
                value:
                  name: FI_PROVIDER
                  value: "efa"
              - op: add
                path: /spec/containers/{{elementIndex}}/env/-
                value:
                  name: FI_EFA_USE_DEVICE_RDMA
                  value: "1"
              - op: add
                path: /spec/containers/{{elementIndex}}/env/-
                value:
                  name: NCCL_DEBUG
                  value: "INFO"
              - op: add
                path: /spec/containers/{{elementIndex}}/env/-
                value:
                  name: NCCL_PROTO
                  value: "simple"

