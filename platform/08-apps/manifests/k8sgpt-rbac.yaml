---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt
  namespace: k8sgpt-operator-system
  labels:
    skyhook.io/component: k8sgpt
    skyhook.io/tier: incubating
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8sgpt-analyzer
  labels:
    skyhook.io/component: k8sgpt
    skyhook.io/tier: incubating
rules:
  - apiGroups: [""]
    resources: [pods, pods/log, services, endpoints, configmaps, secrets, persistentvolumeclaims, persistentvolumes, nodes, events, namespaces, replicationcontrollers, serviceaccounts]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: [deployments, replicasets, statefulsets, daemonsets]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: [jobs, cronjobs]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: [ingresses, networkpolicies]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: [storageclasses, volumeattachments]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: [horizontalpodautoscalers]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: [poddisruptionbudgets]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.sh"]
    resources: [nodepools, nodeclaims]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.k8s.aws"]
    resources: [ec2nodeclasses]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["core.k8sgpt.ai"]
    resources: [k8sgpts, results]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8sgpt-analyzer
  labels:
    skyhook.io/component: k8sgpt
    skyhook.io/tier: incubating
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8sgpt-analyzer
subjects:
  - kind: ServiceAccount
    name: k8sgpt
    namespace: k8sgpt-operator-system

