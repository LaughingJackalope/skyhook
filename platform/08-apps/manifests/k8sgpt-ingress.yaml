---
apiVersion: v1
kind: Service
metadata:
  name: k8sgpt-mcp
  namespace: k8sgpt-operator-system
  labels:
    skyhook.io/component: k8sgpt
    skyhook.io/tier: incubating
spec:
  type: ClusterIP
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: k8sgpt
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8sgpt-mcp
  namespace: k8sgpt-operator-system
  labels:
    skyhook.io/component: k8sgpt
    skyhook.io/tier: incubating
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
    alb.ingress.kubernetes.io/inbound-cidrs: "10.0.0.0/16"
    alb.ingress.kubernetes.io/tags: "skyhook.io/component=k8sgpt,skyhook.io/tier=incubating"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: k8sgpt-mcp
                port:
                  number: 8080

